name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "Files not gofmt'd:"
            echo "$fmt"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ailivili
          POSTGRES_PASSWORD: ailivili
          POSTGRES_DB: ailivili_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ailivili -d ailivili_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: test
        env:
          DATABASE_URL: "postgres://ailivili:ailivili@localhost:5432/ailivili_test?sslmode=disable"
          JWT_SECRET: "ci-test-secret"
          JWT_EXPIRES_MINUTES: "5"
        run: go test -v -count=1 ./...

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: docker build -t ailivili-api ./backend
