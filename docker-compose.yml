services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ailivili
      POSTGRES_PASSWORD: ailivili
      POSTGRES_DB: ailivili
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailivili -d ailivili"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://ailivili:ailivili@db:5432/ailivili?sslmode=disable"
      JWT_SECRET: "dev-secret-change-me"
      JWT_EXPIRES_MINUTES: "60"
      REDIS_URL: "redis:6379"
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  db_data:
  redis_data:
  uploads:
